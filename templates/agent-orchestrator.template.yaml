# Copy to a repo root as `agent-orchestrator.yaml` (committed, per-repo).
# This is the REPO-LEVEL config Composio (`ao`) reads to drive workers in
# isolated worktrees. Engine = external (ADR-0002); this file is policy/pins
# the repo owns. Fill the placeholders below to match this repo.

runtime: tmux              # how ao hosts a session: tmux | … (fill per your setup)
agent: claude-code         # orchestrator agent (and shared fallback for any role)
workspace: worktree        # isolate each worker in its own git worktree

worker:
  # The default SOLO implementer (ADR-0002 Update, ADR-0004). Overrides the
  # flat `agent` for worker sessions only; the orchestrator role stays above.
  # Override per-lineage for competitive best-of-N (claude / codex / cursor).
  agent: cursor

# postCreate runs once in EACH new worktree right after ao creates it.
# Standardise on pnpm + Corepack: this bootstraps deps FAST per worktree.
# pnpm hardlinks packages from its single global content-addressable store,
# so a new worktree costs ~no extra disk and seconds — NOT a full ~149MB
# node_modules copy per worktree. `--frozen-lockfile` keeps it reproducible.
postCreate:
  - corepack enable
  - pnpm install --prefer-offline --frozen-lockfile

# permissions: permissionless   # opt-in: skip Claude Code's per-worktree trust
#   dialog so sandboxed worktrees start without a human clicking "trust this
#   folder". Only enable for worktrees you already isolate/sandbox.

# agentRules: cross-cutting rules ao injects into every worker session. Keep
# these in sync with AGENTS.md (the source of truth) — especially THE GATE.
agentRules: >-
  Read AGENTS.md first; it is the source of truth (workflow, rules, the gate, DoD).

  Use conventional commits (feat:, fix:, chore:, docs:, refactor:, test:).

  Smallest correct change; small diffs. No new dependencies without justification.

  Never commit to main; never touch protected paths or the frozen tests.

  Package manager is pnpm (via Corepack) — use pnpm, not npm/yarn.

  Before pushing, run the gate (fill in this repo's one command), e.g.:

  - corepack enable

  - pnpm install --frozen-lockfile

  - pnpm run build && pnpm run lint && pnpm test && pnpm run validate
