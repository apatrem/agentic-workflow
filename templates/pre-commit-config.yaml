# Copy to a repo root as `.pre-commit-config.yaml`.
# Cheap local hygiene so neither you nor an agent burns review on mechanical nits.
# Activate once per clone:  pipx install pre-commit && pre-commit install
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: detect-private-key
